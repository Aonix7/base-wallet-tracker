<!DOCTYPE html>
<html>
<head>
    <title>Base Wallet Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="dashboard">
    
    <h1>Base Wallet Tracker</h1>

    <button onclick="getPrices()">Refresh Prices</button>

    <h2>Market Overview</h2>

<div class="card">
    <div class="card">
    <h3>BTC Trend</h3>
<div class="card">
    <h3>🐋 Whale Alerts</h3>

    <div id="whaleFeed"></div>
</div>
        
    <div id="chart">
        <div class="bar" style="height: 40px;"></div>
        <div class="bar" style="height: 65px;"></div>
        <div class="bar" style="height: 30px;"></div>
        <div class="bar" style="height: 80px;"></div>
        <div class="bar" style="height: 55px;"></div>
        <div class="bar" style="height: 70px;"></div>
    </div>
</div>
    <h3>Bitcoin (BTC)</h3>
    <p id="btc">loading...</p>
</div>

<div class="card">
    <h3>Ethereum (ETH)</h3>
    <p id="eth">loading...</p>
</div>

    <hr>

    <h2>Wallet Tracker</h2>

    <input id="walletInput" placeholder="Enter wallet address" />

    <button onclick="setWallet()">Track Wallet</button>

    <p id="walletDisplay">No wallet selected</p>
<h3>Recent Activity</h3>

<h3>Recent Activity</h3>

<div id="activityFeed" class="feed"></div>
    <script src="script.js"></script>
    
</div>
</body>
</html>
